name: vault_chord
description: "Song Chord Vault — Simpan dan tampilkan chord lagu favoritmu."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # State Management
  provider: ^6.1.2
  # HTTP Client
  http: ^1.2.2
  # Local Storage (token)
  shared_preferences: ^2.3.2
  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
